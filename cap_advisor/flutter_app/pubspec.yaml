name: cap_advisor_app
description: A Flutter CAP College Advisor app for Maharashtra engineering admissions.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  get_it: ^8.0.2
  pdf: ^3.11.1
  printing: ^5.13.1
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  dartz: ^0.10.1
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.1.0
  path_provider: ^2.1.4
  open_filex: ^4.5.1
  intl: ^0.19.0
  go_router: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
