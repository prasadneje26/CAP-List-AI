version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cap_advisor_db
      POSTGRES_USER: cap_user
      POSTGRES_PASSWORD: cap_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cap_user -d cap_advisor_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://cap_user:cap_pass@postgres:5432/cap_advisor_db
      NODE_ENV: production
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: node server.js

volumes:
  postgres_data:
