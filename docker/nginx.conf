# ============================================================
# AI COLLEGE CAP COUNSELING PLATFORM
# File: docker/nginx.conf
# Nginx reverse proxy — routes all traffic to correct service
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_types         text/plain text/css application/json application/javascript text/xml;
    client_max_body_size 20M;

    # ── Rate limiting zones ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;

    # ── Upstream services ──────────────────────────────────────
    upstream backend {
        server backend:5000;
        keepalive 32;
    }

    upstream ai_engine {
        server ai-engine:8000;
        keepalive 16;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── Main server ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header X-Content-Type-Options  "nosniff"      always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header X-Powered-By           ""              always;

        # ── Backend API ──────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "upgrade";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── AI Engine (internal only) ────────────────────────
        location /ai/ {
            # Block direct external access — only backend calls AI
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny  all;

            rewrite    ^/ai/(.*)$ /$1 break;
            proxy_pass http://ai_engine;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # ── Health endpoints ─────────────────────────────────
        location /health {
            proxy_pass http://backend/health;
        }

        location /ai-health {
            proxy_pass http://ai_engine/health;
        }

        # ── Frontend (catch-all) ─────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_read_timeout 30s;
        }
    }
}
